<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동서농원 꽃 관리법</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #b7e4c7;
    --green-pale: #f0faf4;
    --yellow: #FFD700;
    --yellow-pale: #fffbeb;
    --yellow-dark: #5a4000;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e5e7eb;
    --bg: #fafaf8;
    --white: #ffffff;
    --red-pale: #fff0f0;
    --red: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 헤더 */
  .site-header {
    background: var(--green);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: #fff; } 
  .header-sub { font-size: 11px; color: #95d5b2; }

  .search-wrap { position: relative; }
  .search-input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border-radius: 24px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.5); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    opacity: 0.6;
  }

  .notice-bar {
    background: var(--yellow);
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 700;
    color: var(--yellow-dark);
    text-align: center;
    line-height: 1.5;
  }

  main { padding: 16px 16px 80px; max-width: 640px; margin: 0 auto; }

  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn {
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:active {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .flower-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  @media(min-width:480px) {
    .flower-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .flower-card {
    background: var(--white);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 14px 12px 12px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .flower-card:active { transform: scale(0.97); }
  .flower-card.danger { border-color: #fca5a5; }

  .card-emoji { font-size: 28px; margin-bottom: 8px; display: block; }
  .card-name { font-size: 15px; font-weight: 900; color: var(--text); line-height: 1.2; margin-bottom: 4px; }
  .card-latin { font-size: 10px; color: var(--muted); font-style: italic; margin-bottom: 8px; line-height: 1.4; }

  .card-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
  .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 20px;
    font-weight: 600;
    line-height: 1.4;
  }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-yellow { background: #fef9c3; color: #713f12; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-purple { background: #ede9fe; color: #5b21b6; }

  .card-icons { display: flex; gap: 6px; }
  .icon-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .icon-box {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .icon-label { font-size: 9px; color: var(--muted); }

  .card-arrow {
    position: absolute;
    top: 12px; right: 12px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--green-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--green);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    padding-bottom: 40px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .modal-emoji { font-size: 40px; }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg);
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    flex-shrink: 0;
  }
  .modal-name { font-size: 26px; font-weight: 900; color: var(--text); line-height: 1.1; margin: 8px 0 4px; }
  .modal-latin { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
  .modal-badges { display: flex; flex-wrap: wrap; gap: 5px; }

  .modal-body { padding: 16px 20px; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .info-card {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .info-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
  .info-value { font-size: 14px; font-weight: 700; color: var(--text); }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: var(--green);
    border-radius: 2px;
  }

  .care-list { display: flex; flex-direction: column; gap: 8px; }
  .care-item {
    background: var(--green-pale);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    border-left: 3px solid var(--green);
  }
  .care-item strong { color: var(--green); font-weight: 700; }

  .warning-box {
    background: var(--red-pale);
    border: 1.5px solid #fca5a5;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 12px;
  }
  .warning-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
  .warning-text { font-size: 12px; color: #7f1d1d; line-height: 1.6; }

  .tip-box {
    background: var(--yellow-pale);
    border-left: 3px solid var(--yellow);
    border-radius: 0 10px 10px 0;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--yellow-dark);
    line-height: 1.6;
  }

  .disclaimer {
    margin-top: 16px;
    padding: 12px 14px;
    background: #f9fafb;
    border-radius: 10px;
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.7;
    border: 1px solid #f3f4f6;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 10px 20px 20px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    z-index: 50;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div>
      <div class="logo">동서<span>농원</span></div>
      <div class="header-sub">꽃 관리법 안내</div>
    </div>
  </div>
  <div class="search-wrap">

    </svg>
    <input class="search-input" type="text" placeholder="꽃 이름으로 검색..." id="searchInput" oninput="filterFlowers()">
  </div>
</header>

<div class="notice-bar">
  구매하신 꽃 이름을 찾아 탭하면 관리법을 확인할 수 있어요<br>
  <span style="font-weight:400;font-size:11px">※ 본 정보는 일반적인 재배 참고 자료입니다 — 환경에 따라 결과가 다를 수 있어요</span>
</div>

<main>
  <div class="filter-scroll" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('전체', this)">전체 보기</button>
    <button class="filter-btn" onclick="setFilter('목본류', this)">목본류 🌿</button>
    <button class="filter-btn" onclick="setFilter('초화류', this)">초화류 🌸</button>
    <button class="filter-btn" onclick="setFilter('숙근초', this)">숙근초 🌿</button>
    <button class="filter-btn" onclick="setFilter('허브', this)">허브 🌱</button>
    <button class="filter-btn" onclick="setFilter('주의', this)">주의 품목 ⚠️</button>
  </div>

  <div class="flower-grid" id="flowerGrid"></div>
</main>

<div class="bottom-bar">
  일반적인 재배를 돕는 참고 자료 페이지입니다 — 환경에 따라 결과가 다를 수 있습니다.
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-top-row">
        <div class="modal-emoji" id="mEmoji"></div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-latin" id="mLatin"></div>
      <div class="modal-badges" id="mBadges"></div>
    </div>
    <div class="modal-body">
      <div class="info-grid" id="mInfoGrid"></div>
      <div class="section-title">물주기</div>
      <div id="mWater" class="care-list"></div>
      <div class="section-title">햇빛</div>
      <div id="mSun" class="care-list"></div>
      <div class="section-title">관리 포인트</div>
      <div id="mCare" class="care-list"></div>
      <div id="mWarning"></div>
      <div id="mTip"></div>
      <div class="disclaimer">
        본 관리 정보는 일반적인 재배 참고 자료입니다. 토양·기후·햇빛 조건에 따라 결과가 다를 수 있으며, 동서농원은 재배 결과에 대한 책임을 지지 않습니다. 반려동물·어린이 관련 독성 정보는 반드시 수의사·전문가에게 확인하세요.
      </div>
    </div>
  </div>
</div>

let currentFilter = '전체';
let currentSearch = '';

function renderCards() {
  const grid = document.getElementById('flowerGrid');
  const filtered = flowers.filter(f => {
    const matchFilter = currentFilter === '전체' || (currentFilter === '주의' && f.danger) || f.category === currentFilter;
    const matchSearch = currentSearch === '' || f.name.includes(currentSearch) || f.latin.toLowerCase().includes(currentSearch.toLowerCase());
    return matchFilter && matchSearch;
  });

  grid.innerHTML = filtered.map(f => `
    <div class="flower-card ${f.danger ? 'danger' : ''}" onclick="openModal(${f.id})">
      <span class="card-emoji">${f.emoji}</span>
      <div class="card-name">${f.name}</div>
      <div class="card-latin">${f.latin}</div>
      <div class="card-badges">
        ${f.badges.slice(0,2).map(b => `<span class="badge ${b.cls}">${b.text}</span>`).join('')}
      </div>
      <div class="card-icons">
        <div class="icon-item"><div class="icon-box">☀️</div><div class="icon-label">${f.info[2].val}</div></div>
        <div class="icon-item"><div class="icon-box">💧</div><div class="icon-label">${f.info[3].val}</div></div>
        <div class="icon-item"><div class="icon-box">🌸</div><div class="icon-label">${f.info[0].val}</div></div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  `).join('');

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted);font-size:14px">검색 결과가 없어요</div>';
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterFlowers() {
  currentSearch = document.getElementById('searchInput').value;
  renderCards();
}

function openModal(id) {
  const f = flowers.find(x => x.id === id);
  if (!f) return;

  document.getElementById('mEmoji').textContent = f.emoji;
  document.getElementById('mName').textContent = f.name;
  document.getElementById('mLatin').textContent = f.latin;
  document.getElementById('mBadges').innerHTML = f.badges.map(b => `<span class="badge ${b.cls}">${b.text}</span>`).join('');
  document.getElementById('mInfoGrid').innerHTML = f.info.map(i => `<div class="info-card"><div class="info-label">${i.label}</div><div class="info-value">${i.val}</div></div>`).join('');
  document.getElementById('mWater').innerHTML = f.water.map(t => `<div class="care-item">${t}</div>`).join('');
  document.getElementById('mSun').innerHTML = f.sun.map(t => `<div class="care-item">${t}</div>`).join('');
  document.getElementById('mCare').innerHTML = f.care.map(t => `<div class="care-item">${t}</div>`).join('');
  document.getElementById('mWarning').innerHTML = f.warning ? `<div class="warning-box"><div class="warning-title">⚠️ 주의사항</div><div class="warning-text">${f.warning}</div></div>` : '';
  document.getElementById('mTip').innerHTML = f.tip ? `<div class="tip-box">💡 <strong>Tip.</strong> ${f.tip}</div>` : '';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }

renderCards();
</script>
